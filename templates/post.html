<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">shere<span>cho</span></a>
      <ul class="nav-links" id="navLinks">
        <li><a href="../index.html">首页</a></li>
        <li><a href="../about.html">关于</a></li>
        <li><a href="../blog.html" class="active">博客</a></li>
        <li><a href="../index.html#projects">项目</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="container">
    <article class="post-article fade-in">

      <a href="../blog.html" class="post-back">← 返回博客列表</a>

      <div class="post-meta">
        <span class="post-date">{{DATE}}</span>
        <span class="post-read-time">{{READ_TIME}} min read</span>
      </div>

      {{CATEGORY}}

      <h1 class="post-title">{{PAGE_TITLE}}</h1>

      <div class="post-tags">{{TAGS}}</div>

      <div class="post-body">
{{CONTENT}}
      </div>

      <div class="post-nav">
        {{PREV}}
        {{NEXT}}
      </div>

      <div class="post-footer">
        <p>如果你觉得这篇文章有帮助，欢迎在 <a href="https://github.com/sherecho" target="_blank" rel="noopener">GitHub</a> 与我交流！</p>
      </div>

    </article>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <p>© 2026 sherecho. Built with ❤️ and AI.</p>
        <div class="footer-links">
          <a href="https://github.com/sherecho" target="_blank" rel="noopener">GitHub</a>
          <a href="https://x.com/sherecho" target="_blank" rel="noopener">Twitter</a>
          <a href="mailto:hello@sherecho.dev">Email</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const navToggle = document.getElementById('navToggle');
    const navLinks  = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));

    // Ensure fade-in elements become visible
    setTimeout(() => {
      document.querySelectorAll('.fade-in:not(.visible)').forEach(el => el.classList.add('visible'));
    }, 150);
  </script>

</body>
</html>
